services:
  homelab-agent:
    image: ghcr.io/antybubbs/homelab-docker-agent:latest
    container_name: homelab-agent
    restart: unless-stopped
    environment:
      HOMELAB_URL: "https://your-homelab-url"
      # Use the original token shown once by HomeLab when the agent is created
      # or regenerated. Do not use the SHA-256 hash stored by HomeLab.
      HOMELAB_AGENT_TOKEN: "replace-with-original-generated-token"
      HOMELAB_AGENT_NAME: "docker-host-01"
      HOMELAB_POLL_SECONDS: "30"
      HOMELAB_VERIFY_TLS: "true"
      DOCKER_HOST: "unix:///var/run/docker.sock"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
